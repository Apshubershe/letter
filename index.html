<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Я хочу понять тебя</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EFEDE7;
    --paper-soft: #F7F5F0;
    --ink: #2B2A27;
    --ink-soft: #6B685F;
    --line: #D9D5CB;
    --accent: #5B6B72;      /* приглушённый сине-серый, не романтический */
    --accent-soft: #DCE2E1;
    --focus-glow: rgba(91,107,114,0.18);
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 620px;
    margin: 0 auto;
    padding: 72px 24px 120px;
  }
  .eyebrow{
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 18px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards;
  }
  h1{
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-style: italic;
    font-size: clamp(30px, 6vw, 42px);
    line-height: 1.2;
    margin: 0 0 28px;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.1s forwards;
  }
  .intro{
    font-family: 'Newsreader', serif;
    font-size: 19px;
    line-height: 1.65;
    color: var(--ink);
    margin: 0 0 56px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--line);
    opacity: 0;
    animation: fadeUp 0.9s ease 0.2s forwards;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .section{
    margin-bottom: 44px;
  }
  .section-label{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--accent);
    margin: 0 0 10px;
  }
  .question{
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    margin: 0 0 14px;
    color: var(--ink);
  }
  textarea{
    width: 100%;
    min-height: 96px;
    resize: vertical;
    background: var(--paper-soft);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--ink);
    transition: box-shadow 0.25s ease, border-color 0.25s ease;
  }
  textarea:focus{
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--focus-glow);
  }
  textarea::placeholder{ color: #A8A398; }

  .divider{
    border: none;
    border-top: 1px solid var(--line);
    margin: 56px 0 40px;
  }

  .optional-tag{
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-left: 8px;
    font-weight: 500;
  }

  .actions{
    margin-top: 56px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  button.save{
    align-self: flex-start;
    background: var(--ink);
    color: var(--paper-soft);
    border: none;
    padding: 14px 28px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  button.save:hover{ background: var(--accent); }
  button.save:active{ transform: scale(0.98); }
  button.save:disabled{ opacity: 0.5; cursor: default; }

  .note{
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--ink-soft);
    max-width: 460px;
  }

  .confirm{
    display:none;
    text-align: left;
    padding-top: 40px;
  }
  .confirm h2{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    margin: 0 0 16px;
  }
  .confirm p{
    font-family: 'Newsreader', serif;
    font-size: 18px;
    line-height: 1.6;
    color: var(--ink);
    max-width: 480px;
  }

  .lock-screen{
    max-width: 420px;
    margin: 120px auto;
    padding: 0 24px;
    text-align: center;
  }
  .lock-screen input{
    width: 100%;
    padding: 12px 14px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--paper-soft);
    margin: 18px 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }
  .lock-screen input:focus{ outline:none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--focus-glow); }
  .lock-error{ color: #A24B3F; font-size: 13px; min-height: 18px; }

  .entry{
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px 26px;
    margin-bottom: 24px;
    background: var(--paper-soft);
  }
  .entry-date{
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .entry .q{
    font-family: 'Newsreader', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 15px;
    margin: 18px 0 6px;
  }
  .entry .q:first-of-type{ margin-top: 0; }
  .entry .a{
    font-size: 15.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    color: var(--ink);
  }
  .a.empty{ color: var(--ink-soft); font-style: italic; }
  .empty-state{
    font-family: 'Newsreader', serif;
    font-style: italic;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 80px;
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCOjsXzRzzGw9C3xIzelukf2eQI9N8iMrA",
  authDomain: "projectname-4b221.firebaseapp.com",
  projectId: "projectname-4b221",
  storageBucket: "projectname-4b221.firebasestorage.app",
  messagingSenderId: "41722781863",
  appId: "1:41722781863:web:32aefa6ff0fc8744fcbb82"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

/* ===== настройка ===== */
/* Смени кодовое слово ниже перед тем, как отправишь ссылку. */
const READ_PASSPHRASE = "полынь72";
const DOC_ID = "f89f8c5e3cdb496e9b88df8cc3eebde8";
const docRef = doc(db, "letters", DOC_ID);

const QUESTIONS = [
  { id: "hurt", label: "Что тебя больше всего ранило в тот вечер?" },
  { id: "missed", label: "Что я не заметил в тот момент?" },
  { id: "safety", label: "Что мне нужно изменить, чтобы ты снова чувствовала себя рядом со мной в безопасности?" },
  { id: "unclear", label: "Есть что-то, что я до сих пор не понимаю?" },
];
const OPTIONAL_QUESTION = { id: "keep", label: "Что тебе нравится в наших отношениях и что ты хотела бы сохранить?" };

const app = document.getElementById('app');

function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleString('ru-RU', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderForm(){
  app.innerHTML = `
    <div class="wrap">
      <div id="formView">
        <p class="eyebrow">без спешки, без правильных ответов</p>
        <h1>Я хочу понять тебя.</h1>
        <p class="intro">Я не жду, что ты меня сейчас простишь. Я понял, что не услышал тебя тогда.
        Если ты когда-нибудь захочешь — я хочу понять тебя лучше.</p>

        <div id="questions"></div>

        <hr class="divider" />

        <div class="section">
          <p class="question">${OPTIONAL_QUESTION.label}<span class="optional-tag">необязательно</span></p>
          <textarea data-id="${OPTIONAL_QUESTION.id}" placeholder="Можно оставить пустым"></textarea>
        </div>

        <div class="actions">
          <button class="save" id="saveBtn">Сохранить</button>
          <p class="note">Здесь нет кнопки «отправить ответ». Я просто прочитаю то, что ты напишешь —
          не для того, чтобы сразу ответить или объяснить, а чтобы услышать.</p>
        </div>
      </div>

      <div class="confirm" id="confirmView">
        <h2>Сохранено.</h2>
        <p>Спасибо, что написала это. Можешь вернуться сюда и дописать в любой момент —
        ничего не потеряется.</p>
      </div>
    </div>
  `;

  const qWrap = document.getElementById('questions');
  QUESTIONS.forEach(q => {
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <p class="question">${q.label}</p>
      <textarea data-id="${q.id}" placeholder="Пиши как есть"></textarea>
    `;
    qWrap.appendChild(div);
  });

  document.getElementById('saveBtn').addEventListener('click', onSave);
}

async function onSave(){
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = "Сохраняю…";

  const answers = {};
  document.querySelectorAll('textarea[data-id]').forEach(t => {
    answers[t.dataset.id] = t.value.trim();
  });

  const hasAnyContent = Object.values(answers).some(v => v.length > 0);
  if(!hasAnyContent){
    btn.disabled = false;
    btn.textContent = "Сохранить";
    return;
  }

  const entry = {
    id: 'entry_' + Date.now(),
    timestamp: new Date().toISOString(),
    answers
  };

  try{
    let existing = [];
    try{
      const snap = await getDoc(docRef);
      if(snap.exists() && Array.isArray(snap.data().entries)) existing = snap.data().entries;
    }catch(e){ existing = []; }

    existing.push(entry);
    await setDoc(docRef, { entries: existing });

    document.getElementById('formView').style.display = 'none';
    document.getElementById('confirmView').style.display = 'block';
  }catch(e){
    btn.disabled = false;
    btn.textContent = "Сохранить";
    alert("Не получилось сохранить. Попробуй ещё раз через минуту.");
  }
}

function renderLock(){
  app.innerHTML = `
    <div class="lock-screen">
      <p class="eyebrow" style="text-align:center;">режим чтения</p>
      <input type="password" id="pass" placeholder="кодовое слово" autofocus />
      <div class="lock-error" id="lockErr"></div>
    </div>
  `;
  const input = document.getElementById('pass');
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      if(input.value === READ_PASSPHRASE){
        renderEntries();
      } else {
        document.getElementById('lockErr').textContent = "не то слово";
        input.value = '';
      }
    }
  });
}

async function renderEntries(){
  app.innerHTML = `<div class="wrap"><p class="eyebrow">режим чтения</p><h1>То, что она написала</h1></div>`;
  const wrap = document.createElement('div');
  wrap.className = 'wrap';
  wrap.style.paddingTop = '0';

  let entries = [];
  try{
    const snap = await getDoc(docRef);
    if(snap.exists() && Array.isArray(snap.data().entries)) entries = snap.data().entries;
  }catch(e){ entries = []; }

  if(entries.length === 0){
    wrap.innerHTML = `<p class="empty-state">Она ещё ничего не сохранила.</p>`;
  } else {
    entries.slice().reverse().forEach(entry => {
      const el = document.createElement('div');
      el.className = 'entry';
      let html = `<div class="entry-date">${fmtDate(entry.timestamp)}</div>`;
      [...QUESTIONS, OPTIONAL_QUESTION].forEach(q => {
        const val = (entry.answers && entry.answers[q.id]) ? entry.answers[q.id] : '';
        html += `<div class="q">${q.label}</div>`;
        html += val
          ? `<div class="a">${val.replace(/</g,'&lt;')}</div>`
          : `<div class="a empty">не заполнено</div>`;
      });
      el.innerHTML = html;
      wrap.appendChild(el);
    });
  }
  app.appendChild(wrap);
}

if(window.location.hash === '#read'){
  renderLock();
} else {
  renderForm();
}
</script>
</body>
</html>
